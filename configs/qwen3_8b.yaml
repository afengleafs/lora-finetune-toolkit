# Qwen3-8B Model Configuration

model:
  name: "Qwen/Qwen3-8B"
  device_map: "auto"
  torch_dtype: "auto"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "float32"

lora:
  r: 32
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  num_train_epochs: 10
  learning_rate: 3.0e-4
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  max_length: 1024
  optim: "paged_adamw_8bit"
  logging_steps: 10
  auto_find_batch_size: true
  packing: false

tokenizer:
  padding_side: "right"
  use_eos_as_pad: true
